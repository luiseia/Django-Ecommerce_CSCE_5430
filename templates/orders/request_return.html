{% extends "base.html" %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">
  <h2>Request Return</h2>
  <p class="text-muted">
    Order: {{ order.order_number }}
  </p>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Reason</label>
          {{ form.reason }}
        </div>

        <button type="submit" class="btn btn-danger">Submit Return Request</button>
        <a href="{% url 'orders:order_detail' order.order_number %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
